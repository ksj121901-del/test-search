<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧜‍♀️ 시그 검색</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Gaegu', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(180deg, #fffdf2 0%, #fff8d6 50%, #fff2b8 100%);
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
}

/* 헤더 */
.top-bar {
    height: 80px;
    background: linear-gradient(135deg, #FEE500, #fff08d);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: #234;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,.12);
}

/* 검색창 */
.search-box {
    margin-bottom: 20px;
}

.search-box input {
    width: 100%;
    height: 65px;
    border: none;
    outline: none;
    border-radius: 999px;
    padding: 0 25px;
    font-size: 22px;
    background: white;
    box-shadow: 0 8px 20px rgba(0,0,0,.08);
}

.search-box input::placeholder {
    color: #7ec4d8;
}

/* 헤더 라벨 */
.header {
    display: grid;
    /* 좋아요 칸 확보를 위해 그리드 비율 조정 (단가 | 이름 | 좋아요) */
    grid-template-columns: 100px 1fr 80px;
    margin-bottom: 10px;
    padding: 0 10px;
    color: #0086aa;
    font-size: 18px;
    font-weight: 700;
}
.header .text-right {
    text-align: right;
    padding-right: 10px;
}

/* 카드 */
.list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 140px;
}

.card {
    display: grid;
    /* 단가 | 이름 | 좋아요 버튼 구조 */
    grid-template-columns: 100px 1fr 80px;
    align-items: center;
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(10px);
    min-height: 85px;
    border-radius: 28px;
    padding: 0 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,.08);
    transition: .25s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-3px) scale(1.02);
}

/* 번호 */
.number {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fee500, #fff4a3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: #5a4a00;
    box-shadow: 0 4px 10px rgba(0,0,0,.1);
}

/* 이름 */
.name {
    font-size: 26px;
    font-weight: 700;
    color: #28536b;
}

/* 리스트 내부 좋아요 카운트 */
.list-like {
    text-align: right;
    padding-right: 10px;
    font-size: 20px;
    font-weight: 700;
    color: #ba9e00;
}
.list-like.liked {
    color: #ff9100;
}

.no-result {
    text-align: center;
    background: white;
    border-radius: 25px;
    padding: 30px;
    font-size: 22px;
}

/* 장식 */
.bubble {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,.4);
    z-index: -1;
}

.b1 { width: 100px; height: 100px; top: 80px; left: 40px; }
.b2 { width: 70px; height: 70px; right: 30px; top: 200px; }
.b3 { width: 120px; height: 120px; bottom: 100px; left: 10%; }

/* 미니 플레이어 */
.mini-player {
    position: fixed;
    left: 50%;
    bottom: -140px;
    transform: translateX(-50%);
    width: 95%;
    max-width: 650px;
    background: white;
    border-radius: 25px 25px 0 0;
    padding: 20px;
    box-shadow: 0 -5px 20px rgba(0,0,0,.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: .35s;
    z-index: 9999;
}

.mini-player.show {
    bottom: 0;
}

.player-info {
    flex: 1;
}

#nowPlaying {
    font-weight: 700;
    color: #5A4A00;
    font-size: 20px;
}

.player-controls {
    display: flex;
    align-items: center;
    gap: 10px;
}

.player-btn {
    width: 45px;
    height: 45px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    background: #FEE500;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#volumeSlider {
    width: 90px;
    accent-color: #FEE500;
}

#likeBtn.liked {
    background: #ffd700;
}
</style>
</head>
<body>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>

<div class="container">
    <div class="top-bar">🧜‍♀️ 채니 시그 검색 🐚</div>

    <div class="search-box">
        <input type="text" id="search" placeholder="🔍 시그를 검색해보세요">
    </div>

    <div class="header">
        <div>단가</div>
        <div>시그 이름</div>
        <div class="text-right">좋아요</div>
    </div>

    <div id="list" class="list"></div>
</div>

<div id="miniPlayer" class="mini-player">
    <div class="player-info">
        <div id="nowPlaying">🎵 재생중인 시그 없음</div>
    </div>
    <div class="player-controls">
        <button id="likeBtn" class="player-btn" onclick="toggleLike()">🤍</button>
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
        <button class="player-btn" onclick="togglePlay()">⏯️</button>
    </div>
    <audio id="audioPlayer"></audio>
</div>

<script>
const sigList = [
    { id:28, name:"이쁘다니까" }, { id:29, name:"살구송" }, { id:33, name:"오버드라이브" },
    { id:35, name:"모찌송" }, { id:38, name:"간밧떼" }, { id:49, name:"나니가스키" },
    { id:51, name:"두산베어스" }, { id:52, name:"LG트윈스" }, { id:53, name:"삼성라이온즈" },
    { id:54, name:"롯데자이언츠" }, { id:55, name:"기아타이거즈" }, { id:56, name:"한화이글스" },
    { id:57, name:"KT위즈" }, { id:58, name:"헤비머신건" }, { id:59, name:"피리송" },
    { id:60, name:"삐끼삐끼" }, { id:61, name:"뿌애" }, { id:62, name:"홀드업" },
    { id:64, name:"맷돌" }, { id:66, name:"외모췍" }, { id:67, name:"칭칭언니" },
    { id:68, name:"베이스다운로우" }, { id:73, name:"잘가라" }, { id:74, name:"따따블" },
    { id:75, name:"무조건" }, { id:76, name:"찐이야" }, { id:77, name:"진짜배기" },
    { id:78, name:"한잔해" }, { id:79, name:"뿐이고" }, { id:81, name:"팬서비스" },
    { id:82, name:"고민중독" }, { id:83, name:"트월킹덕" }, { id:85, name:"버터플라이" },
    { id:86, name:"솜사탕" }, { id:87, name:"캐치캐치" }, { id:88, name:"묵찌빠" },
    { id:89, name:"간바레" }, { id:90, name:"뾱뾱이" }, { id:91, name:"여우" },
    { id:92, name:"슈퍼맨" }, { id:94, name:"파라파라" }, { id:96, name:"역도" },
    { id:97, name:"고민중독" }, { id:98, name:"전파송" }, { id:99, name:"나루토" },
    { id:101, name:"꽃게춤" }, { id:102, name:"무아" }, { id:103, name:"왜요왜요" },
    { id:104, name:"마티니" }, { id:105, name:"자기야화풀어" }, { id:106, name:"왓이즈러브" },
    { id:107, name:"슈퍼그럼요" }, { id:108, name:"러브쉐이크" }, { id:109, name:"핫해" },
    { id:110, name:"라라리라라" }, { id:111, name:"콩나물" }, { id:112, name:"바람피면D지는거야" },
    { id:113, name:"난예술이야" }, { id:114, name:"나랑사ꈖ래" }, { id:115, name:"체온" },
    { id:116, name:"핑크레이디" }, { id:117, name:"소원을말해봐" }, { id:118, name:"슈가프리" },
    { id:119, name:"키싱유" }, { id:120, name:"꿈빛파티시엘" }, { id:121, name:"롤리폴리" },
    { id:122, name:"오빠바이러스" }, { id:123, name:"빛을따라서" }, { id:124, name:"사랑받을준비완료" },
    { id:125, name:"보핍보핍" }, { id:126, name:"드라마" }, { id:127, name:"심쿵해" },
    { id:128, name:"호텔파티" }, { id:129, name:"패스트카" }, { id:130, name:"매니악" },
    { id:131, name:"너와의지금" }, { id:134, name:"잇츠미" }, { id:135, name:"마그네틱" },
    { id:145, name:"뱅뱅" }, { id:146, name:"배드걸굿걸" }, { id:153, name:"우유" },
    { id:155, name:"드라군" }, { id:158, name:"계엄령" }, 
    { id:159, name:"오빠하앙", audio:"music/159.mp3" }, 
    { id:160, name:"널그리며" }, { id:162, name:"노바디노즈" }, { id:163, name:"와" },
    { id:164, name:"킥드베" }, { id:165, name:"제로투" }, { id:166, name:"바우치" },
    { id:169, name:"터미널" }
];

const list = document.getElementById("list");
const search = document.getElementById("search");
const player = document.getElementById("audioPlayer");
const miniPlayer = document.getElementById("miniPlayer");
const nowPlaying = document.getElementById("nowPlaying");
const volumeSlider = document.getElementById("volumeSlider");
const likeBtn = document.getElementById("likeBtn");

let currentSong = "";
player.volume = 0.5;

// 로컬스토리지에서 특정 곡의 좋아요 상태 가져오기 유틸리티 함수
function getLikeData(songName) {
    const likes = JSON.parse(localStorage.getItem("likes") || "{}");
    return likes[songName] || { count: 0, clicked: false };
}

function render(keyword=""){
    const filtered = sigList.filter(item =>
        item.name.toLowerCase().includes(keyword.toLowerCase())
    );

    if(filtered.length === 0){
        list.innerHTML = `<div class="no-result">🐠 검색 결과가 없어요!</div>`;
        return;
    }

    list.innerHTML = filtered.map(item => {
        const likeData = getLikeData(item.name);
        const heartIcon = likeData.clicked ? "💛" : "🤍";
        const likedClass = likeData.clicked ? "liked" : "";
        
        return `
            <div class="card" onclick="playMusic('${item.audio ? item.audio : ''}', '${item.name}')">
                <div class="number">${item.id}</div>
                <div class="name">${item.name}</div>
                <div class="list-like ${likedClass}">
                    ${heartIcon} ${likeData.count}
                </div>
            </div>
        `;
    }).join('');
}

search.addEventListener('input',(e)=>{
    render(e.target.value);
});

function playMusic(src, title){
    if(!src || src === 'undefined') {
        alert(`'${title}' 음원 파일이 아직 준비되지 않았습니다.`);
        return;
    }

    currentSong = title;
    player.src = src;
    player.play();

    nowPlaying.textContent = "🎵 " + title;
    miniPlayer.classList.add("show");
    loadLikeState();
}

function togglePlay(){
    if(player.paused){
        player.play();
    }else{
        player.pause();
    }
}

volumeSlider.addEventListener("input", function(){
    player.volume = this.value / 100;
});

function toggleLike(){
    if(!currentSong) return;
    const likes = JSON.parse(localStorage.getItem("likes") || "{}");
    
    if(!likes[currentSong]) {
        likes[currentSong] = { count: 0, clicked: false };
    }

    // 토글 처리 (클릭 해제 시 count -1, 클릭 시 count +1)
    if(likes[currentSong].clicked) {
        likes[currentSong].clicked = false;
        likes[currentSong].count = Math.max(0, likes[currentSong].count - 1);
    } else {
        likes[currentSong].clicked = true;
        likes[currentSong].count += 1;
    }

    localStorage.setItem("likes", JSON.stringify(likes));
    
    loadLikeState(); // 플레이어 하트 업데이트
    render(search.value); // 리스트 숫자 실시간 업데이트
}

function loadLikeState(){
    if(!currentSong) return;
    const likeData = getLikeData(currentSong);

    if(likeData.clicked){
        likeBtn.innerHTML = "💛";
        likeBtn.classList.add("liked");
    }else{
        likeBtn.innerHTML = "🤍";
        likeBtn.classList.remove("liked");
    }
}

// 최초 실행
render();
</script>
</body>
</html>
